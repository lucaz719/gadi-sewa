name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to server via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST || '209.42.27.143' }}
          SERVER_USER: ${{ secrets.SERVER_USER || 'gadisewa' }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          FRONTEND_DEPLOY_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH || '/home/gadisewa/public_html' }}
          BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH || '/home/gadisewa/backend' }}
          RESTART_PATH: ${{ secrets.RESTART_PATH || '/home/gadisewa/tmp' }}
        run: |
          # Validate required secrets
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          if [ -z "$SERVER_HOST" ]; then
            echo "::error::SERVER_HOST secret is not set"
            exit 1
          fi
          if [ -z "$SERVER_USER" ]; then
            echo "::error::SERVER_USER secret is not set"
            exit 1
          fi
          if [ -z "$FRONTEND_DEPLOY_PATH" ]; then
            echo "::error::FRONTEND_DEPLOY_PATH secret is not set"
            exit 1
          fi
          if [ -z "$BACKEND_DEPLOY_PATH" ]; then
            echo "::error::BACKEND_DEPLOY_PATH secret is not set"
            exit 1
          fi

          # Setup SSH
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Write SSH key with proper newline handling using heredoc
          cat > ~/.ssh/deploy_key << 'SSHKEYEOF'
          $SSH_PRIVATE_KEY
          SSHKEYEOF
          chmod 600 ~/.ssh/deploy_key
          
          # Verify the key format
          if ! ssh-keygen -l -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::SSH private key is invalid"
            exit 1
          fi

          echo "Scanning host key for $SERVER_HOST..."
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "::warning::ssh-keyscan failed; deployment will use accept-new as fallback"
          fi

          # Common SSH options
          SSH_OPTS="-i ~/.ssh/deploy_key -p $SERVER_PORT -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -o LogLevel=ERROR"

          # Deploy frontend (built files)
          echo "Deploying frontend to $FRONTEND_DEPLOY_PATH..."
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            dist/ \
            "$SERVER_USER@$SERVER_HOST:$FRONTEND_DEPLOY_PATH/"

          # Deploy backend from the host-ready package
          echo "Deploying backend_deploy to $BACKEND_DEPLOY_PATH..."
          rsync -avz --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude '*.db' \
            --exclude '*.sqlite3' \
            --exclude 'venv/' \
            -e "ssh $SSH_OPTS" \
            backend_deploy/ \
            "$SERVER_USER@$SERVER_HOST:$BACKEND_DEPLOY_PATH/"

          # Install/update backend dependencies on server
          echo "Installing backend dependencies on server..."
          ssh $SSH_OPTS \
            "$SERVER_USER@$SERVER_HOST" \
            "cd $BACKEND_DEPLOY_PATH && pip install -r requirements.txt --user --quiet"

          # Restart the application (touch restart.txt for Passenger)
          echo "Restarting application..."
          ssh $SSH_OPTS \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p $RESTART_PATH && touch $RESTART_PATH/restart.txt"

          # Cleanup
          rm -f ~/.ssh/deploy_key

          echo "Deployment complete!"
