name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate application
        run: python -c "from main import app; print('App validated')"
        env:
          ADMIN_ACCESS_TOKEN: ${{ secrets.ADMIN_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Build Docker image
        run: docker build -t gadisewa-backend:${{ github.sha }} .

      - name: Login to Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag gadisewa-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/gadisewa-backend:latest
          docker tag gadisewa-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/gadisewa-backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/gadisewa-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/gadisewa-backend:${{ github.sha }}
