name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to server via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Validate required secrets
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          if [ -z "$SERVER_HOST" ]; then
            echo "::error::SERVER_HOST secret is not set"
            exit 1
          fi
          if [ -z "$SERVER_USER" ]; then
            echo "::error::SERVER_USER secret is not set"
            exit 1
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::DEPLOY_PATH secret is not set"
            exit 1
          fi

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "Scanning host key for $SERVER_HOST..."
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          if [ $? -ne 0 ]; then
            echo "::warning::ssh-keyscan failed; deployment will use accept-new as fallback"
          fi

          # Common SSH options
          SSH_OPTS="-i ~/.ssh/deploy_key -p $SERVER_PORT -o StrictHostKeyChecking=accept-new"

          # Deploy frontend (built files)
          echo "Deploying frontend to $DEPLOY_PATH..."
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            dist/ \
            "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"

          # Deploy backend
          echo "Deploying backend to $DEPLOY_PATH/backend..."
          rsync -avz --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude '*.db' \
            --exclude '*.sqlite3' \
            --exclude 'venv/' \
            -e "ssh $SSH_OPTS" \
            backend/ \
            "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/backend/"

          # Install/update backend dependencies on server
          echo "Installing backend dependencies on server..."
          ssh $SSH_OPTS \
            "$SERVER_USER@$SERVER_HOST" \
            "cd $DEPLOY_PATH/backend && pip install -r requirements.txt --user --quiet"

          # Restart the application (touch restart.txt for Passenger)
          echo "Restarting application..."
          ssh $SSH_OPTS \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p $DEPLOY_PATH/tmp && touch $DEPLOY_PATH/tmp/restart.txt"

          # Cleanup
          rm -f ~/.ssh/deploy_key

          echo "Deployment complete!"
